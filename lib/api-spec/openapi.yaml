openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Maritime Email Extraction API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: extraction
    description: Email extraction operations
  - name: history
    description: Extraction history
  - name: stats
    description: Cost and performance statistics
  - name: knowledge
    description: Maritime knowledge base
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /emails/extract:
    post:
      operationId: extractEmail
      tags: [extraction]
      summary: Extract structured data from a maritime email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtractionInput"
      responses:
        "200":
          description: Extraction result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionJob"
        "400":
          description: Bad request

  /emails/extract/json:
    post:
      operationId: extractEmailJson
      tags: [extraction]
      summary: Extract maritime email and return pure enterprise JSON array
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtractionInput"
      responses:
        "200":
          description: Enterprise JSON array of extracted entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EnterpriseEntry"
        "400":
          description: Bad request

  /emails:
    get:
      operationId: listExtractions
      tags: [history]
      summary: List past extraction jobs
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: emailType
          in: query
          schema:
            type: string
            enum: [VC, TC, Tonnage, Mixed, Unknown]
      responses:
        "200":
          description: List of extraction jobs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionListResponse"

  /emails/{id}:
    get:
      operationId: getExtraction
      tags: [history]
      summary: Get a single extraction job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Extraction job details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionJob"
        "404":
          description: Not found

    delete:
      operationId: deleteExtraction
      tags: [history]
      summary: Delete an extraction job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get cost savings and extraction statistics
      responses:
        "200":
          description: Platform statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStats"

  /knowledge/regions:
    get:
      operationId: listRegions
      tags: [knowledge]
      summary: List maritime region abbreviations
      responses:
        "200":
          description: Regions list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KnowledgeEntry"

  /knowledge/ports:
    get:
      operationId: listPorts
      tags: [knowledge]
      summary: List known maritime ports
      responses:
        "200":
          description: Ports list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KnowledgeEntry"

  /knowledge/vessel-sizes:
    get:
      operationId: listVesselSizes
      tags: [knowledge]
      summary: List vessel size classifications
      responses:
        "200":
          description: Vessel sizes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VesselSizeEntry"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ExtractionInput:
      type: object
      required:
        - emailText
      properties:
        emailText:
          type: string
          minLength: 10
        subject:
          type: ["string", "null"]

    EnterpriseEntry:
      type: object
      required:
        - email_type
        - vessel_name
        - vessel_type
        - dwt
        - cargo
        - cargo_type
        - load_port
        - discharge_port
        - open_port
        - open_date
        - close_date
        - laycan_start
        - laycan_end
        - quantity
        - quantity_unit
        - load_rate
        - discharge_rate
        - commission
        - imo
        - grt
        - nrt
        - loa
        - beam
        - grain_capacity
        - restrictions
        - matching_region
        - confidence_score
      properties:
        email_type:
          type: string
        vessel_name:
          type: string
        vessel_type:
          type: string
        dwt:
          type: string
        cargo:
          type: string
        cargo_type:
          type: string
        load_port:
          type: string
        discharge_port:
          type: string
        open_port:
          type: string
        open_date:
          type: string
        close_date:
          type: string
        laycan_start:
          type: string
        laycan_end:
          type: string
        quantity:
          type: string
        quantity_unit:
          type: string
        load_rate:
          type: string
        discharge_rate:
          type: string
        commission:
          type: string
        imo:
          type: string
        grt:
          type: string
        nrt:
          type: string
        loa:
          type: string
        beam:
          type: string
        grain_capacity:
          type: string
        restrictions:
          type: array
          items:
            type: string
        matching_region:
          type: string
        confidence_score:
          type: number

    ExtractionJob:
      type: object
      required:
        - id
        - emailText
        - emailType
        - pipeline
        - extractedEntries
        - processingMs
        - llmUsed
        - estimatedCostUsd
        - createdAt
      properties:
        id:
          type: integer
        emailText:
          type: string
        subject:
          type: ["string", "null"]
        emailType:
          type: string
          enum: [VC, TC, Tonnage, Mixed, Unknown]
        pipeline:
          type: string
          enum: [rule-based, template, llm-fallback]
        confidence:
          type: number
        extractedEntries:
          type: array
          items:
            $ref: "#/components/schemas/ExtractedEntry"
        processingMs:
          type: integer
        llmUsed:
          type: boolean
        estimatedCostUsd:
          type: number
        createdAt:
          type: string

    ExtractedEntry:
      type: object
      required:
        - entryType
        - fields
        - confidence
        - extractionMethod
      properties:
        entryType:
          type: string
          enum: [VC, TC, Tonnage]
        confidence:
          type: number
        extractionMethod:
          type: string
          enum: [rule-based, template, llm-fallback]
        fields:
          $ref: "#/components/schemas/ExtractedFields"

    ExtractedFields:
      type: object
      properties:
        email_type:
          type: ["string", "null"]
        cargo_name:
          type: ["string", "null"]
        account_name:
          type: ["string", "null"]
        cargo_type:
          type: ["string", "null"]
        tonnage_name:
          type: ["string", "null"]
        tonnage_type:
          type: ["string", "null"]
        min_size:
          type: ["number", "null"]
        max_size:
          type: ["number", "null"]
        region:
          type: ["string", "null"]
        matching_region:
          type: ["string", "null"]
        load_port:
          type: ["string", "null"]
        discharge_port:
          type: ["string", "null"]
        del_port:
          type: ["string", "null"]
        redel_port:
          type: ["string", "null"]
        port:
          type: ["string", "null"]
        open_date:
          type: ["string", "null"]
        close_date:
          type: ["string", "null"]
        laycan_start_date:
          type: ["string", "null"]
        laycan_end_date:
          type: ["string", "null"]
        duration:
          type: ["string", "null"]
        dwt:
          type: ["string", "null"]
        imo:
          type: ["string", "null"]
        grt:
          type: ["string", "null"]
        nrt:
          type: ["string", "null"]
        loa:
          type: ["string", "null"]
        beam:
          type: ["string", "null"]
        grain_capacity:
          type: ["string", "null"]
        load_rate:
          type: ["string", "null"]
        discharge_rate:
          type: ["string", "null"]
        commission:
          type: ["string", "null"]
        pic:
          type: ["string", "null"]
        email_id:
          type: ["string", "null"]
        phone_number:
          type: ["string", "null"]
        restriction:
          type: ["string", "null"]
        reason:
          type: ["string", "null"]

    ExtractionListResponse:
      type: object
      required:
        - items
        - total
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ExtractionJob"
        total:
          type: integer

    PlatformStats:
      type: object
      required:
        - totalEmails
        - ruleBasedCount
        - templateCount
        - llmFallbackCount
        - estimatedLlmSavingsUsd
        - avgProcessingMs
        - avgConfidence
        - costReductionPct
        - recentActivity
      properties:
        totalEmails:
          type: integer
        ruleBasedCount:
          type: integer
        templateCount:
          type: integer
        llmFallbackCount:
          type: integer
        estimatedLlmSavingsUsd:
          type: number
        avgProcessingMs:
          type: number
        avgConfidence:
          type: number
        costReductionPct:
          type: number
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/ActivityPoint"

    ActivityPoint:
      type: object
      required:
        - date
        - count
        - llmUsed
      properties:
        date:
          type: string
        count:
          type: integer
        llmUsed:
          type: integer

    KnowledgeEntry:
      type: object
      required:
        - code
        - fullName
        - category
      properties:
        code:
          type: string
        fullName:
          type: string
        category:
          type: string

    VesselSizeEntry:
      type: object
      required:
        - name
        - minDwt
        - maxDwt
      properties:
        name:
          type: string
        minDwt:
          type: integer
        maxDwt:
          type: ["integer", "null"]
        description:
          type: ["string", "null"]
